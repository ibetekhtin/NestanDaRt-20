# ============================================================================
# NestanDaRt-20 — CI/CD Pipeline
# ============================================================================
# Запускается при пуше в main (только при изменении кода, не docs).
# Jobs:
#   1. lint         — проверка Python, поиск хардкод-секретов
#   2. secret-scan  — gitleaks
#   3. docker       — сборка и пуш образа backend в ghcr.io
#   4. deploy       — SSH деплой на VPS /opt/NestanDaRt-20 (если VPS_HOST задан)
# ============================================================================

name: NestanDaRt-20 CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "archive-docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "archive-docs/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DOCKER_IMAGE_BACKEND: ghcr.io/${{ github.repository }}/nestandart-backend

jobs:
  # ─── Job 1: Проверка кода ────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          if [ -f app/backend/requirements.txt ]; then pip install -r app/backend/requirements.txt; fi

      - name: Lint Python (flake8)
        run: |
          flake8 app/backend/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Check Python formatting (black)
        run: |
          black --check --diff app/backend/ || echo "Formatting issues found (non-blocking)"

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secret values..."
          if grep -rEn \
            '(SUPABASE_SERVICE_KEY|TELEGRAM_BOT_TOKEN|GEMINI_API_KEY|GROQ_API_KEY|AITUNNEL_API_KEY)\s*=\s*[A-Za-z0-9+/._-]{30,}' \
            --include="*.py" --include="*.js" --include="*.yml" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude="*.example*" . \
            | grep -v 'os\.getenv\|process\.env\|secrets\.\|getenv('; then
            echo "❌ Hardcoded secret value found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Validate docker-compose
        run: |
          docker compose config -q 2>/dev/null || echo "Skipped (env vars missing in CI)"

  # ─── Job 2: Сканирование секретов ───────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 3: Сборка Docker образа backend ─────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nestandart-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Деплой на VPS ────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    # Запускается только если секрет VPS_HOST задан в GitHub repo settings
    if: github.ref == 'refs/heads/main' && secrets.VPS_HOST != ''

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/NestanDaRt-20

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐳 Rebuilding backend..."
            docker compose build nestandart-backend
            docker compose up -d --remove-orphans

            echo "⏳ Waiting for health check..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ nestandart-backend is healthy"
                break
              fi
              sleep 3
            done

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo "✅ Deploy complete!"
