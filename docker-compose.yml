# ═══════════════════════════════════════════════════════════════
# NestanDaRt-20 — Docker Compose
# VPS: 77.42.93.187
#
# Сервисы:
#   nestandart-backend  FastAPI REST API
#   nestandart-n8n      n8n автоматизации (бот КотЭ живёт здесь)
#
# Запуск:  docker compose up -d
# Логи:    docker compose logs -f nestandart-backend
# Стоп:    docker compose down
# ═══════════════════════════════════════════════════════════════
name: nestandart-20

services:

  nestandart-backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: nestandart-backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      nestandart-net:
        aliases:
          - kote-backend   # n8n workflow использует это имя — не менять без обновления workflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nestandart-n8n:
    image: n8nio/n8n:2.25.7
    container_name: nestandart-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_LOG_LEVEL=warn
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - nestandart-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  n8n_data:
    name: kote-n8n-data    # НЕ переименовывать — там workflows n8n

networks:
  nestandart-net:
    name: nestandart-network
    driver: bridge
